<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone Admin - Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-card: #0a0a0a;
      --text-primary: #f0f0f0;
      --text-secondary: #6b7280;
      --border: #161616;
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { max-width: 450px; width: 100%; margin: 0 auto; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 28px; font-weight: 700; }
    .logo span { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    .card h2 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
    .card p { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: #050505;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); display: block; }
    .message.warning { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: var(--warning); display: block; }
    .register-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
    .register-link a { color: var(--primary); text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>EARN<span>ZONE</span></h1>
      <p>Administration</p>
    </div>
    <div class="card">
      <h2>Connexion admin</h2>
      <p>Connectez-vous pour accéder au tableau de bord</p>
      
      <div id="message" class="message"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@earnzone.com" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" class="form-control" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
      </form>
      
      <div class="register-link">
        Pas encore de compte ? <a href="register.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword } from "firebase/auth";
    import { getFirestore, doc, getDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
      authDomain: "earnzone-9e82e.firebaseapp.com",
      projectId: "earnzone-9e82e",
      storageBucket: "earnzone-9e82e.firebasestorage.app",
      messagingSenderId: "1076831479440",
      appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
      messageDiv.className = 'message ' + type;
      messageDiv.innerHTML = text;
      setTimeout(() => messageDiv.className = 'message', 5000);
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> Connexion...' : '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showMessage('Email et mot de passe requis', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        // Connexion Firebase Auth
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Vérifier le rôle dans Firestore
        const userDoc = await getDoc(doc(db, "users", user.uid));
        
        if (!userDoc.exists()) {
          showMessage('Compte non trouvé dans la base', 'error');
          setLoading(false);
          return;
        }
        
        const userData = userDoc.data();
        const role = userData.role;
        
        // Vérifier si l'utilisateur a le droit d'accéder à l'admin
        if (role !== 'admin') {
          showMessage('Accès non autorisé. Ce portail est réservé aux administrateurs.', 'error');
          setLoading(false);
          return;
        }
        
        // Stocker la session
        localStorage.setItem('earnzone_admin_user', user.uid);
        
        showMessage('Connexion réussie ! Redirection...', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
        
      } catch (error) {
        console.error(error);
        let errorMsg = "Email ou mot de passe incorrect";
        if (error.code === 'auth/user-not-found') errorMsg = "Aucun compte avec cet email";
        else if (error.code === 'auth/wrong-password') errorMsg = "Mot de passe incorrect";
        else if (error.code === 'auth/too-many-requests') errorMsg = "Trop de tentatives. Réessayez plus tard";
        showMessage(errorMsg, 'error');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
