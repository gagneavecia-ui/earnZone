<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone Admin - Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --transition: all 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }
    .container { max-width: 450px; width: 100%; margin: 0 auto; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 28px; font-weight: 700; font-family: 'Playfair Display', serif; }
    .logo span { background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
    .admin-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--danger), #ff1a4f);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 8px;
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    .card h2 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
    .card p { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error { background: rgba(255, 77, 109, 0.15); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .message.success { background: rgba(46, 232, 154, 0.15); border: 1px solid var(--success); color: var(--success); display: block; }
    .message.info { background: rgba(183, 110, 255, 0.15); border: 1px solid var(--primary); color: var(--primary-light); display: block; }
    .back-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-dim); }
    .back-link a { color: var(--primary); text-decoration: none; }
    
    .firebase-loader {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      color: var(--primary-light);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(183,110,255,0.2);
      transition: opacity 0.3s;
    }
    .firebase-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(183,110,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  
  <div class="firebase-loader" id="firebaseLoader">
    <div class="loader-spinner"></div>
    <span>Chargement...</span>
  </div>
  
  <div class="container">
    <div class="logo">
      <h1>EARN<span>ZONE</span></h1>
      <p>Espace Administration</p>
      <div class="admin-badge"><i class="fas fa-shield-alt"></i> Accès réservé</div>
    </div>
    <div class="card">
      <h2>Connexion Admin</h2>
      <p>Connectez-vous avec votre compte administrateur</p>
      <div id="message" class="message"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@earnzone.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" class="form-control" placeholder="Votre mot de passe" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
      </form>
      <div class="back-link">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Retour au site public</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    // ===== CONFIGURATION =====
    const firebaseConfig = {
      apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
      authDomain: "earnzone-9e82e.firebaseapp.com",
      projectId: "earnzone-9e82e",
      storageBucket: "earnzone-9e82e.firebasestorage.app",
      messagingSenderId: "1076831479440",
      appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
    };
    
    // ⚠️ EMAIL ADMIN À MODIFIER
    const ADMIN_EMAIL = "gagneavecia@gmail.com";
    
    // ===== VARIABLES =====
    let auth, db, isFirebaseReady = false;
    
    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.className = 'message ' + type;
      messageDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + text;
      setTimeout(() => {
        if (messageDiv.className === 'message ' + type) {
          messageDiv.className = 'message';
        }
      }, 5000);
    }
    
    function setLoading(isLoading) {
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = isLoading;
      loginBtn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> Connexion...' : '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }
    
    async function handleLogin(email, password) {
      setLoading(true);
      
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Vérification email admin
        if (user.email !== ADMIN_EMAIL) {
          await signOut(auth);
          showMessage("Accès non autorisé. Compte administrateur requis.", 'error');
          setLoading(false);
          return;
        }
        
        // Vérifier role dans Firestore
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists() || userDoc.data().role !== 'admin') {
          await signOut(auth);
          showMessage("Accès non autorisé. Compte administrateur requis.", 'error');
          setLoading(false);
          return;
        }
        
        // Sauvegarder session admin
        localStorage.setItem('earnzone_admin_session', JSON.stringify({
          email: user.email,
          uid: user.uid,
          timestamp: Date.now()
        }));
        
        showMessage("Connexion réussie ! Redirection...", 'success');
        
        setTimeout(() => {
          window.location.href = '../index.html';
        }, 1500);
        
      } catch (error) {
        console.error('Erreur connexion admin:', error);
        showMessage("Email ou mot de passe incorrect.", 'error');
        setLoading(false);
      }
    }
    
    // ===== CHARGEMENT ASYNCHRONE FIREBASE =====
    async function loadFirebase() {
      const loader = document.getElementById('firebaseLoader');
      loader.classList.remove('hidden');
      
      try {
        const { initializeApp } = await import("firebase/app");
        const { getAuth, signInWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence, onAuthStateChanged } = await import("firebase/auth");
        const { getFirestore, doc, getDoc } = await import("firebase/firestore");
        
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;
        window.getDoc = getDoc;
        window.doc = doc;
        
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        await setPersistence(auth, browserLocalPersistence);
        console.log('✅ Persistance admin configurée');
        
        window.auth = auth;
        window.db = db;
        isFirebaseReady = true;
        
        // Vérifier si déjà connecté
        onAuthStateChanged(auth, async (user) => {
          if (user && user.email === ADMIN_EMAIL) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists() && userDoc.data().role === 'admin') {
              window.location.href = '../index.html';
            }
          }
        });
        
        // Activer formulaire
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          if (!isFirebaseReady) {
            showMessage("Chargement en cours, veuillez patienter...", 'info');
            return;
          }
          
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          
          if (!email || !password) {
            showMessage("Email et mot de passe requis", 'error');
            return;
          }
          
          await handleLogin(email, password);
        });
        
      } catch (error) {
        console.error('Erreur chargement Firebase:', error);
        showMessage("Erreur de connexion. Rechargez la page.", 'error');
      } finally {
        setTimeout(() => loader.classList.add('hidden'), 500);
      }
    }
    
    loadFirebase();
  </script>
</body>
</html>
