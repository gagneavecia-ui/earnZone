<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone Admin - Inscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-card: #0a0a0a;
      --text-primary: #f0f0f0;
      --text-secondary: #6b7280;
      --border: #161616;
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { max-width: 450px; width: 100%; margin: 0 auto; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 28px; font-weight: 700; }
    .logo span { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    .card h2 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
    .card p { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: #050505;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); display: block; }
    .message.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--success); display: block; }
    .login-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
    .login-link a { color: var(--primary); text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
    .info-banner {
      background: rgba(139,63,232,0.1);
      border: 1px solid rgba(139,63,232,0.2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-banner i { color: var(--primary); font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>EARN<span>ZONE</span></h1>
      <p>Administration</p>
    </div>
    <div class="card">
      <h2>Créer un compte admin</h2>
      <p>Inscrivez-vous pour accéder au tableau de bord</p>
      
      <div class="info-banner">
        <i class="fas fa-shield-alt"></i>
        <span>Ce portail est réservé à l'administration. Après inscription, votre compte devra être activé.</span>
      </div>
      
      <div id="message" class="message"></div>
      
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> Nom complet</label>
          <input type="text" id="fullName" class="form-control" placeholder="Votre nom" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@earnzone.com" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" class="form-control" placeholder="Minimum 6 caractères" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Répétez le mot de passe" required>
        </div>
        <button type="submit" class="btn" id="registerBtn"><i class="fas fa-user-plus"></i> Créer mon compte</button>
      </form>
      
      <div class="login-link">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword } from "firebase/auth";
    import { getFirestore, doc, setDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
      authDomain: "earnzone-9e82e.firebaseapp.com",
      projectId: "earnzone-9e82e",
      storageBucket: "earnzone-9e82e.firebasestorage.app",
      messagingSenderId: "1076831479440",
      appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
      messageDiv.className = 'message ' + type;
      messageDiv.innerHTML = type === 'error' ? '<i class="fas fa-exclamation-circle"></i> ' + text : '<i class="fas fa-check-circle"></i> ' + text;
      setTimeout(() => messageDiv.className = 'message', 5000);
    }

    function setLoading(isLoading) {
      registerBtn.disabled = isLoading;
      registerBtn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> Création en cours...' : '<i class="fas fa-user-plus"></i> Créer mon compte';
    }

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (!fullName || !email || !password) {
        showMessage('Tous les champs sont obligatoires', 'error');
        return;
      }
      if (password.length < 6) {
        showMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
        return;
      }
      if (password !== confirmPassword) {
        showMessage('Les mots de passe ne correspondent pas', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        // Créer l'utilisateur dans Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Enregistrer dans Firestore avec rôle "pending" (en attente d'activation)
        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          fullName: fullName,
          email: email,
          role: "pending",  // En attendant que l'admin principal active
          balance: 0,
          registrationDate: new Date().toISOString(),
          createdAt: new Date().toISOString()
        });
        
        // Stocker dans localStorage pour la session
        localStorage.setItem('earnzone_admin_user', user.uid);
        
        showMessage('Compte créé avec succès ! Redirection vers connexion...', 'success');
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        
      } catch (error) {
        console.error(error);
        let errorMsg = "Une erreur est survenue";
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMsg = 'Cet email est déjà utilisé';
            break;
          case 'auth/invalid-email':
            errorMsg = 'Email invalide';
            break;
          case 'auth/weak-password':
            errorMsg = 'Mot de passe trop faible';
            break;
          default:
            errorMsg = error.message;
        }
        showMessage(errorMsg, 'error');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
