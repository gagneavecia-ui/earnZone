<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone Admin - Inscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --bg-medium: #08080F;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%); bottom: 20%; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(20px, -20px) scale(1.05); } 66% { transform: translate(-15px, 15px) scale(0.95); } }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-transform: uppercase;
      text-decoration: none;
    }
    .logo-text span {
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 40px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .register-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 32px 24px;
    }

    .register-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .register-header h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .register-header p {
      color: var(--text-dim);
      font-size: 13px;
    }
    .admin-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-light);
    }
    .form-group label i {
      color: var(--primary);
      margin-right: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.2);
    }

    .btn-register {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-register:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error {
      background: rgba(255, 77, 109, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      display: block;
    }
    .message.success {
      background: rgba(46, 232, 154, 0.15);
      border: 1px solid var(--success);
      color: var(--success);
      display: block;
    }
    .message.warning {
      background: rgba(255, 209, 102, 0.15);
      border: 1px solid var(--warning);
      color: var(--warning);
      display: block;
    }

    .login-redirect {
      text-align: center;
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .login-redirect a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .login-redirect a:active {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid rgba(183, 110, 255, 0.06);
      margin-top: auto;
    }
    .footer p {
      color: var(--text-dim);
      font-size: 11px;
    }

    .warning-note {
      background: rgba(255, 209, 102, 0.1);
      border: 1px solid rgba(255, 209, 102, 0.2);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .warning-note i {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="header">
  <a href="/" class="logo-text">EARN<span>ZONE</span></a>
</header>

<main class="container">
  <div class="register-card">
    <div class="register-header">
      <h1>Inscription Admin</h1>
      <p>Accès réservé aux administrateurs</p>
      <div class="admin-badge"><i class="fas fa-shield-alt"></i> Accès restreint</div>
    </div>

    <div class="warning-note">
      <i class="fas fa-exclamation-triangle"></i>
      <span>Seul l'email <strong>gagneavecia@gmail.com</strong> peut créer un compte administrateur.</span>
    </div>

    <div id="message" class="message error" style="display: none;"></div>

    <form id="registerForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="admin@earnzone.com" required>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Mot de passe</label>
        <input type="password" id="password" placeholder="Minimum 6 caractères" required>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user-shield"></i> Code d'invitation</label>
        <input type="text" id="inviteCode" placeholder="Code admin requis">
      </div>

      <button type="submit" class="btn-register" id="registerBtn">
        <i class="fas fa-user-shield"></i> Créer compte admin
      </button>
    </form>

    <div class="login-redirect">
      Déjà un compte admin ? <a href="login.html">Connectez-vous</a>
    </div>
  </div>
</main>

<footer class="footer">
  <p>&copy; 2026 EarnZone Administration</p>
</footer>

<!-- Firebase - CHARGÉ EN DERNIER -->
<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
    authDomain: "earnzone-9e82e.firebaseapp.com",
    projectId: "earnzone-9e82e",
    storageBucket: "earnzone-9e82e.firebasestorage.app",
    messagingSenderId: "1076831479440",
    appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  
  setPersistence(auth, browserLocalPersistence);

  // EMAIL ADMIN UNIQUE AUTORISÉ
  const ADMIN_EMAIL = "gagneavecia@gmail.com";
  const ADMIN_INVITE_CODE = "EARNZONE_ADMIN_2026"; // Code d'invitation

  function showMessage(text, type = 'error') {
    const msgDiv = document.getElementById('message');
    msgDiv.className = `message ${type}`;
    msgDiv.innerText = text;
    msgDiv.style.display = 'block';
    setTimeout(() => {
      msgDiv.style.display = 'none';
    }, 5000);
  }

  // Vérifier si un compte admin existe déjà
  async function checkAdminExists() {
    const usersRef = collection(db, "users");
    const q = query(usersRef, where("role", "==", "admin"));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  }

  // Rediriger si déjà connecté en tant qu'admin
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const userDoc = await getDocs(query(collection(db, "users"), where("uid", "==", user.uid)));
        if (!userDoc.empty) {
          const userData = userDoc.docs[0].data();
          if (userData.role === 'admin') {
            window.location.href = 'index.html';
          }
        }
      } catch(e) {
        console.error(e);
      }
    }
  });

  const registerForm = document.getElementById('registerForm');
  const registerBtn = document.getElementById('registerBtn');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const inviteCode = document.getElementById('inviteCode').value.trim();

    // Vérifications
    if (!email || !password || !confirmPassword) {
      showMessage('Tous les champs sont obligatoires.', 'error');
      return;
    }

    // Vérification email admin
    if (email !== ADMIN_EMAIL) {
      showMessage(`Accès non autorisé. Seul ${ADMIN_EMAIL} peut créer un compte admin.`, 'error');
      return;
    }

    // Vérification code d'invitation
    if (inviteCode !== ADMIN_INVITE_CODE) {
      showMessage('Code d\'invitation incorrect.', 'error');
      return;
    }

    // Vérifier si un compte admin existe déjà
    const adminExists = await checkAdminExists();
    if (adminExists) {
      showMessage('Un compte administrateur existe déjà. Connectez-vous.', 'warning');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
      return;
    }

    if (password.length < 6) {
      showMessage('Le mot de passe doit contenir au moins 6 caractères.', 'error');
      return;
    }

    if (password !== confirmPassword) {
      showMessage('Les mots de passe ne correspondent pas.', 'error');
      return;
    }

    // Désactiver bouton
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="loader"></span> Création en cours...';

    try {
      // Création du compte Firebase
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Création du document admin dans Firestore
      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        email: email,
        role: 'admin',
        status: 'active',
        registrationDate: new Date().toISOString(),
        isInvited: true
      });

      showMessage('Compte administrateur créé avec succès ! Redirection...', 'success');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);

    } catch (error) {
      console.error("Erreur Firebase:", error);
      
      switch (error.code) {
        case 'auth/email-already-in-use':
          showMessage('Cet email est déjà utilisé. Connectez-vous.', 'error');
          break;
        case 'auth/invalid-email':
          showMessage('Email invalide.', 'error');
          break;
        case 'auth/weak-password':
          showMessage('Mot de passe trop faible (minimum 6 caractères).', 'error');
          break;
        default:
          showMessage('Erreur lors de l\'inscription. Réessayez.', 'error');
      }
      
      registerBtn.disabled = false;
      registerBtn.innerHTML = '<i class="fas fa-user-shield"></i> Créer compte admin';
    }
  });
</script>
</body>
</html>
