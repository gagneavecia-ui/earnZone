<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone Admin - Inscription Administrateur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --warning: #FFD166;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%); bottom: 20%; right: -80px; animation-delay: -4s; }
    
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    .container { max-width: 450px; width: 100%; margin: 0 auto; animation: fadeInScale 0.5s ease-out; }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 32px; font-weight: 800; font-family: 'Playfair Display', serif; letter-spacing: 2px; }
    .logo span { background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
    .admin-shield { background: linear-gradient(135deg, var(--danger), #ff1a4f); padding: 4px 12px; border-radius: 20px; font-size: 11px; display: inline-block; margin-top: 8px; }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 36px 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
    }
    .card:hover { border-color: rgba(183, 110, 255, 0.2); }

    .card h2 { font-size: 24px; margin-bottom: 8px; font-weight: 700; background: linear-gradient(135deg, var(--danger), #ff1a4f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card p { color: var(--text-dim); font-size: 13px; margin-bottom: 28px; }

    .form-group { margin-bottom: 22px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-light); }
    .form-label i { color: var(--danger); margin-right: 6px; }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.2); }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--danger), #ff1a4f);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13px;
      text-align: center;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .message.error { background: rgba(255, 77, 109, 0.15); border: 1px solid var(--danger); color: var(--danger); display: flex; }
    .message.success { background: rgba(46, 232, 154, 0.15); border: 1px solid var(--success); color: var(--success); display: flex; }

    .login-link { text-align: center; margin-top: 28px; font-size: 13px; color: var(--text-dim); }
    .login-link a { color: var(--danger); text-decoration: none; font-weight: 600; }
    .login-link a:active { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .initial-loader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg-dark);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }
    .initial-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--card-border);
      border-top-color: var(--danger);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .secret-code-info {
      background: rgba(255, 77, 109, 0.08);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
    }
    .secret-code-info i { color: var(--danger); margin-right: 5px; }
  </style>
</head>
<body>

  <div id="initialLoader" class="initial-loader">
    <div class="loader-spinner"></div>
  </div>

  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="logo">
      <h1>EARN<span>ZONE</span></h1>
      <p>Administration</p>
      <div class="admin-shield"><i class="fas fa-shield-alt"></i> Espace Administrateur</div>
    </div>
    <div class="card">
      <h2><i class="fas fa-user-shield"></i> Créer un compte Admin</h2>
      <p>Inscription réservée aux administrateurs</p>
      
      <div class="secret-code-info">
        <i class="fas fa-key"></i> Code secret requis pour l'inscription
      </div>
      
      <div id="message" class="message"></div>
      
      <form id="adminRegisterForm">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> Nom complet</label>
          <input type="text" id="fullName" class="form-control" placeholder="Votre nom et prénom" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@earnzone.com" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" class="form-control" placeholder="Minimum 8 caractères" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Confirmer mot de passe</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Répétez le mot de passe" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-key"></i> Code secret</label>
          <input type="password" id="secretCode" class="form-control" placeholder="Code d'accès administrateur" required>
        </div>
        <button type="submit" class="btn" id="registerBtn">
          <i class="fas fa-shield-alt"></i> Créer le compte Admin
        </button>
      </form>
      
      <div class="login-link">
        Déjà un compte admin ? <a href="admin-login.html">Connectez-vous</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence, fetchSignInMethodsForEmail } from "firebase/auth";
    import { getFirestore, doc, setDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
      authDomain: "earnzone-9e82e.firebaseapp.com",
      projectId: "earnzone-9e82e",
      storageBucket: "earnzone-9e82e.firebasestorage.app",
      messagingSenderId: "1076831479440",
      appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Masquer le loader
    setTimeout(() => {
      document.getElementById('initialLoader').classList.add('hidden');
    }, 300);

    // 🔐 CODE SECRET ADMIN (changez-le si besoin)
    const ADMIN_SECRET_CODE = "EARNZONE2026";

    const form = document.getElementById('adminRegisterForm');
    const registerBtn = document.getElementById('registerBtn');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
      messageDiv.className = 'message ' + type;
      messageDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + text;
      setTimeout(() => {
        messageDiv.className = 'message';
      }, 5000);
    }

    function setLoading(isLoading) {
      registerBtn.disabled = isLoading;
      registerBtn.innerHTML = isLoading 
        ? '<span class="spinner"></span> Création en cours...' 
        : '<i class="fas fa-shield-alt"></i> Créer le compte Admin';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const secretCode = document.getElementById('secretCode').value;
      
      // Validations
      if (!fullName || !email || !password || !confirmPassword || !secretCode) {
        showMessage('Tous les champs sont obligatoires', 'error');
        return;
      }
      
      // Vérification du code secret
      if (secretCode !== ADMIN_SECRET_CODE) {
        showMessage('Code secret invalide. Accès non autorisé.', 'error');
        return;
      }
      
      if (password.length < 8) {
        showMessage('Le mot de passe doit contenir au moins 8 caractères', 'error');
        return;
      }
      
      if (password !== confirmPassword) {
        showMessage('Les mots de passe ne correspondent pas', 'error');
        return;
      }
      
      if (!email.match(/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/)) {
        showMessage('Email invalide', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        // Vérifier si l'email existe déjà
        const signInMethods = await fetchSignInMethodsForEmail(auth, email);
        if (signInMethods.length > 0) {
          showMessage('Un compte avec cet email existe déjà', 'error');
          setLoading(false);
          return;
        }
        
        // Configurer la persistance
        await setPersistence(auth, browserLocalPersistence);
        
        // Créer l'utilisateur Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // 🔐 CRÉER LE DOCUMENT AVEC ROLE ADMIN
        const adminData = {
          uid: user.uid,
          fullName: fullName,
          email: email,
          role: "admin",  // ← RÔLE ADMIN
          status: "active",
          isAdmin: true,
          createdAt: new Date().toISOString(),
          lastLogin: new Date().toISOString(),
          registrationDate: new Date().toISOString()
        };
        
        await setDoc(doc(db, "users", user.uid), adminData);
        
        // Stocker dans localStorage
        localStorage.setItem('earnzone_user', JSON.stringify({
          uid: user.uid,
          email: email,
          fullName: fullName,
          role: "admin",
          isAdmin: true
        }));
        
        showMessage('✅ Compte administrateur créé avec succès ! Redirection...', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
        
      } catch (error) {
        console.error(error);
        let errorMsg = "Erreur lors de la création du compte";
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMsg = 'Cet email est déjà utilisé';
            break;
          case 'auth/invalid-email':
            errorMsg = 'Email invalide';
            break;
          case 'auth/weak-password':
            errorMsg = 'Mot de passe trop faible';
            break;
          case 'auth/network-request-failed':
            errorMsg = 'Problème de connexion internet';
            break;
        }
        
        showMessage(errorMsg, 'error');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
