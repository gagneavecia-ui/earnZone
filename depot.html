<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Rechargement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-transform: uppercase;
    }
    .logo-text span {
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 24px 16px 60px; }

    .page-header { text-align: center; margin-bottom: 32px; }
    .page-header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .page-header p { color: var(--text-dim); font-size: 13px; margin-top: 8px; }

    .solde-card {
      background: linear-gradient(135deg, rgba(183, 110, 255, 0.15), rgba(139, 63, 232, 0.08));
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      margin-bottom: 32px;
      border: 1px solid rgba(183, 110, 255, 0.2);
    }
    .solde-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
    .solde-value { font-size: 32px; font-weight: 800; color: var(--primary-light); }

    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title i { color: var(--primary); }

    .packs-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pack-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .pack-card.selected {
      border-color: var(--primary);
      background: rgba(183, 110, 255, 0.1);
      box-shadow: 0 0 0 2px rgba(183, 110, 255, 0.2);
    }
    .pack-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .pack-info p { font-size: 12px; color: var(--text-dim); }
    .pack-price { font-size: 18px; font-weight: 800; color: var(--primary-light); }

    .code-input {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .code-input label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .code-input input {
      width: 100%;
      padding: 14px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      color: var(--text-light);
      font-size: 14px;
      text-transform: uppercase;
    }
    .code-input input:focus { outline: none; border-color: var(--primary); }

    .btn-valider {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-valider:active { transform: scale(0.98); }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error { background: rgba(255, 77, 109, 0.15); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .message.success { background: rgba(46, 232, 154, 0.15); border: 1px solid var(--success); color: var(--success); display: block; }

    .footer { text-align: center; padding: 20px 0; border-top: 1px solid rgba(183, 110, 255, 0.06); margin-top: 20px; }
    .footer p { color: var(--text-dim); font-size: 11px; }
  </style>
</head>
<body>

<div class="gradient-bg"></div>

<header class="header">
  <a href="index.html" class="logo"><div class="logo-text">EARN<span>ZONE</span></div></a>
  <div class="menu-btn" onclick="window.location.href='index.html'" style="width:40px;height:40px;background:rgba(255,255,255,0.05);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;"><i class="fas fa-bars"></i></div>
</header>

<main class="container">
  <div class="page-header">
    <h1>Rechargement</h1>
    <p>Utilisez un code coupon pour recharger votre solde</p>
  </div>

  <div class="solde-card">
    <div class="solde-label">Votre solde actuel</div>
    <div class="solde-value" id="soldeValue">0 FCFA</div>
  </div>

  <div class="section-title"><i class="fas fa-tag"></i> Choisissez un montant</div>
  <div class="packs-grid" id="packsGrid"></div>

  <div class="code-input">
    <label><i class="fas fa-key"></i> Code coupon</label>
    <input type="text" id="couponCode" placeholder="Ex: RECHARGE-001" autocomplete="off">
  </div>

  <button class="btn-valider" id="validerBtn"><i class="fas fa-check-circle"></i> Valider le rechargement</button>
  <div id="message" class="message"></div>
</main>

<footer class="footer"><p>&copy; 2026 EarnZone. Tous droits réservés.</p></footer>

<script>
  // ============================================
  // VÉRIFICATION CONNEXION
  // ============================================
  const userId = localStorage.getItem('earnzone_current_user');
  if (!userId) {
    window.location.href = 'login.html';
  }

  let userData = {};
  const savedData = localStorage.getItem(`earnzone_user_${userId}`);
  if (savedData) {
    userData = JSON.parse(savedData);
  } else {
    localStorage.removeItem('earnzone_current_user');
    window.location.href = 'login.html';
  }

  // ============================================
  // LISTE DES PACKS DE RECHARGEMENT
  // ============================================
  const packs = [
    { id: "start", montant: 3000, label: "Start", gainReel: 3000 },
    { id: "micro", montant: 5000, label: "Micro", gainReel: 5000 },
    { id: "bronze", montant: 10000, label: "Bronze", gainReel: 10000 },
    { id: "silver", montant: 15000, label: "Silver", gainReel: 15000 },
    { id: "gold", montant: 25000, label: "Gold", gainReel: 25000 }
  ];

  // ============================================
  // LISTE DES CODES COUPON (MODIFIABLE)
  // Tu ajoutes tes codes ici !
  // ============================================
  let couponCodes = [
    // Pack Start (3000 FCFA)
    { code: "S001", montant: 3000, used: false },
    { code: "START-002", montant: 3000, used: false },
    { code: "START-003", montant: 3000, used: false },
    // Pack Micro (5000 FCFA)
    { code: "MICRO-001", montant: 5000, used: false },
    { code: "MICRO-002", montant: 5000, used: false },
    // Pack Bronze (10000 FCFA)
    { code: "BRONZE-001", montant: 10000, used: false },
    { code: "BRONZE-002", montant: 10000, used: false },
    // Pack Silver (15000 FCFA)
    { code: "SILVER-001", montant: 15000, used: false },
    // Pack Gold (25000 FCFA)
    { code: "GOLD-001", montant: 25000, used: false },
    { code: "GOLD-002", montant: 25000, used: false }
  ];

  let selectedPack = null;

  // ============================================
  // AFFICHAGE DU SOLDE
  // ============================================
  function updateSolde() {
    document.getElementById('soldeValue').innerText = (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
  }

  // ============================================
  // AFFICHAGE DES PACKS
  // ============================================
  function renderPacks() {
    const grid = document.getElementById('packsGrid');
    grid.innerHTML = packs.map(pack => `
      <div class="pack-card" data-id="${pack.id}" data-montant="${pack.montant}">
        <div class="pack-info">
          <h3>${pack.label}</h3>
          <p>Rechargement de ${pack.montant.toLocaleString('fr-FR')} FCFA</p>
        </div>
        <div class="pack-price">${pack.montant.toLocaleString('fr-FR')} FCFA</div>
      </div>
    `).join('');

    // Sélection au clic
    document.querySelectorAll('.pack-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedPack = {
          id: card.dataset.id,
          montant: parseInt(card.dataset.montant)
        };
      });
    });
  }

  // ============================================
  // SAUVEGARDE DES DONNÉES
  // ============================================
  function saveUserData() {
    localStorage.setItem(`earnzone_user_${userId}`, JSON.stringify(userData));
  }

  // ============================================
  // VALIDATION DU CODE COUPON
  // ============================================
  function validateCoupon(code, montantAttendu) {
    const coupon = couponCodes.find(c => c.code === code && !c.used && c.montant === montantAttendu);
    if (coupon) {
      coupon.used = true;
      return true;
    }
    return false;
  }

  // ============================================
  // RECHARGEMENT
  // ============================================
  document.getElementById('validerBtn').addEventListener('click', () => {
    const code = document.getElementById('couponCode').value.trim().toUpperCase();
    const messageDiv = document.getElementById('message');

    if (!selectedPack) {
      messageDiv.className = 'message error';
      messageDiv.innerText = '❌ Veuillez sélectionner un montant de rechargement.';
      setTimeout(() => messageDiv.className = 'message', 3000);
      return;
    }

    if (!code) {
      messageDiv.className = 'message error';
      messageDiv.innerText = '❌ Veuillez entrer un code coupon.';
      setTimeout(() => messageDiv.className = 'message', 3000);
      return;
    }

    if (validateCoupon(code, selectedPack.montant)) {
      // Ajout du montant au solde
      userData.balance = (userData.balance || 0) + selectedPack.montant;
      saveUserData();
      updateSolde();

      // Marquer que l'utilisateur a fait son premier dépôt
      localStorage.setItem('earnzone_has_deposited', 'true');

      messageDiv.className = 'message success';
      messageDiv.innerText = `✅ Rechargement réussi ! ${selectedPack.montant.toLocaleString('fr-FR')} FCFA ajoutés à votre solde.`;
      
      document.getElementById('couponCode').value = '';
      selectedPack = null;
      document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('selected'));

      setTimeout(() => messageDiv.className = 'message', 3000);
    } else {
      messageDiv.className = 'message error';
      messageDiv.innerText = '❌ Code coupon invalide, déjà utilisé ou ne correspond pas au montant sélectionné.';
      setTimeout(() => messageDiv.className = 'message', 3000);
    }
  });

  // ============================================
  // INITIALISATION
  // ============================================
  renderPacks();
  updateSolde();
</script>

</body>
</html>
