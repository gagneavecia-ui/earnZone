<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Formations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --warning: #FFD166;
      --danger: #FF4D6D;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
      --glass-border: rgba(183, 110, 255, 0.07);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%); bottom: 20%; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-transform: uppercase;
      text-decoration: none;
    }
    .logo-text span {
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      transition: var(--transition);
      padding: 8px 12px;
      border-radius: 12px;
      background: var(--glass-bg);
    }
    .back-btn:active { 
      background: rgba(183, 110, 255, 0.15);
      color: var(--primary);
      transform: scale(0.95);
    }

    .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }

    .hero-section {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, rgba(183, 110, 255, 0.12), rgba(139, 63, 232, 0.08));
      border: 1px solid rgba(183, 110, 255, 0.25);
      border-radius: 50px;
      padding: 7px 14px;
      margin-bottom: 16px;
    }
    .hero-badge span { color: var(--primary-light); font-size: 12px; font-weight: 600; }
    .hero-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
    .hero-title span { background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-description { font-size: 14px; color: var(--text-dim); }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .section-title i {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
    }

    .formations-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .formation-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      overflow: hidden;
      transition: var(--transition);
      animation: fadeInUp 0.5s ease both;
    }

    .formation-image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      filter: brightness(0.7);
      position: relative;
    }

    .coming-soon-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #FFD166, #FFA500);
      color: #030305;
      font-size: 12px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 30px;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      letter-spacing: 0.5px;
    }

    .formation-content {
      padding: 20px;
      position: relative;
    }

    .formation-category {
      display: inline-block;
      background: linear-gradient(90deg, rgba(183, 110, 255, 0.15), rgba(139, 63, 232, 0.1));
      border: 1px solid rgba(183, 110, 255, 0.2);
      color: var(--primary-light);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .formation-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .formation-description {
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .formation-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .formation-meta i {
      color: var(--primary);
      margin-right: 6px;
    }

    .notification-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(183, 110, 255, 0.12), rgba(139, 63, 232, 0.08));
      border: 1px solid rgba(183, 110, 255, 0.2);
      border-radius: 20px;
      color: var(--primary-light);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .notification-btn:active {
      transform: scale(0.97);
      background: rgba(183, 110, 255, 0.2);
    }

    .notification {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      transform: translateY(200px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      max-width: 400px;
      margin: 0 auto;
    }
    .notification.show { transform: translateY(0); }
    .notification-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: black; }
    .notification-content h4 { font-size: 14px; margin-bottom: 4px; }
    .notification-content p { font-size: 11px; color: var(--text-dim); }

    .back-home {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 16px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      text-align: center;
      box-shadow: 0 5px 25px rgba(183, 110, 255, 0.3);
      z-index: 99;
      transition: var(--transition);
      max-width: 500px;
      margin: 0 auto;
    }
    .back-home:active { transform: scale(0.97); opacity: 0.9; }

    .image-wrapper {
      position: relative;
    }

    @media (max-width: 480px) {
      .container { padding: 16px 12px; }
      .hero-title { font-size: 28px; }
      .formation-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="notification" id="notification">
  <div class="notification-icon"><i class="fas fa-bell"></i></div>
  <div class="notification-content">
    <h4 id="notificationTitle">Notification</h4>
    <p id="notificationMessage">Bientôt disponible !</p>
  </div>
</div>

<header class="header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Retour</a>
  <div class="logo-text">EARN<span>ZONE</span></div>
  <div style="width: 60px;"></div>
</header>

<main class="container">
  <div class="hero-section">
    <div class="hero-badge"><i class="fas fa-graduation-cap"></i><span>Bientôt disponible</span></div>
    <h1 class="hero-title">Formations <span>EarnZone</span></h1>
    <p class="hero-description">Des formations exclusives arrivent très prochainement</p>
  </div>

  <div class="section-title"><i class="fas fa-rocket"></i> Formations à venir</div>
  <div class="formations-grid" id="formationsGrid"></div>
</main>

<a href="index.html" class="back-home"><i class="fas fa-home"></i> Retour à l'accueil</a>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "firebase/auth";
  import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
    authDomain: "earnzone-9e82e.firebaseapp.com",
    projectId: "earnzone-9e82e",
    storageBucket: "earnzone-9e82e.firebasestorage.app",
    messagingSenderId: "1076831479440",
    appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  
  setPersistence(auth, browserLocalPersistence);

  let currentUser = null;

  const formations = [
    {
      id: "business_launch",
      title: "Business Launch : 0 → 1",
      description: "Lancez votre business rentable sans investissement initial. Méthodes éprouvées pour débuter.",
      category: "🚀 Business",
      duration: "5h15",
      lessons: 12,
      price: "GRATUIT",
      image: "https://images.pexels.com/photos/3183197/pexels-photo-3183197.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1",
      rating: 4.9,
      reviews: 85,
      comingSoon: true,
      releaseDate: "15 Juin 2026"
    },
    {
      id: "marketing_storm",
      title: "Marketing Storm",
      description: "Maîtrisez les réseaux sociaux et le marketing digital. Apprenez à créer du contenu viral.",
      category: "📣 Marketing",
      duration: "6h00",
      lessons: 15,
      price: "GRATUIT",
      image: "https://images.pexels.com/photos/669615/pexels-photo-669615.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1",
      rating: 4.7,
      reviews: 68,
      comingSoon: true,
      releaseDate: "15 Juin 2026"
    },
    {
      id: "crypto_invest",
      title: "Crypto Invest",
      description: "Investir dans les cryptomonnaies : Bitcoin, Ethereum, et les stratégies gagnantes.",
      category: "💰 Crypto",
      duration: "8h30",
      lessons: 20,
      price: "5 000 FCFA",
      image: "https://images.pexels.com/photos/7567443/pexels-photo-7567443.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1",
      rating: 4.8,
      reviews: 42,
      comingSoon: true,
      releaseDate: "1 Juillet 2026"
    },
    {
      id: "trading_101",
      title: "Trading 101",
      description: "Bases du trading : analyse technique, gestion des risques et stratégies rentables.",
      category: "📊 Trading",
      duration: "10h00",
      lessons: 24,
      price: "10 000 FCFA",
      image: "https://images.pexels.com/photos/6802049/pexels-photo-6802049.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1",
      rating: 4.9,
      reviews: 56,
      comingSoon: true,
      releaseDate: "15 Juillet 2026"
    }
  ];

  function showNotification(title, message, type = 'success') {
    document.getElementById('notificationTitle').innerText = title;
    document.getElementById('notificationMessage').innerHTML = message;
    const notif = document.getElementById('notification');
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 3500);
    if (navigator.vibrate) navigator.vibrate(50);
  }

  function notifierMe(courseTitle) {
    showNotification('🔔 Alerte mise en place', `Vous serez notifié(e) dès que "${courseTitle}" sera disponible !`, 'success');
  }

  function renderFormations() {
    const grid = document.getElementById('formationsGrid');
    
    grid.innerHTML = formations.map((f, index) => `
      <div class="formation-card" style="animation-delay: ${index * 0.1}s">
        <div class="image-wrapper">
          <img src="${f.image}" alt="${f.title}" class="formation-image" loading="lazy">
          <div class="coming-soon-badge">
            <i class="fas fa-clock"></i> Bientôt
          </div>
        </div>
        <div class="formation-content">
          <span class="formation-category">${f.category}</span>
          <h3 class="formation-title">${f.title}</h3>
          <p class="formation-description">${f.description}</p>
          <div class="formation-meta">
            <span><i class="far fa-clock"></i> ${f.duration}</span>
            <span><i class="fas fa-star"></i> ${f.rating} (${f.reviews} avis)</span>
          </div>
          <div class="formation-meta">
            <span><i class="fas fa-tag"></i> ${f.price}</span>
            <span><i class="fas fa-calendar-alt"></i> Sortie: ${f.releaseDate}</span>
          </div>
          <button class="notification-btn" onclick="notifierMe('${f.title}')">
            <i class="fas fa-bell"></i> Me notifier à la sortie
          </button>
        </div>
      </div>
    `).join('');
  }

  window.notifierMe = notifierMe;

  async function loadUserData(uid) {
    const userRef = doc(db, "users", uid);
    const userDoc = await getDoc(userRef);
    
    if (userDoc.exists()) {
      const userData = userDoc.data();
      // Mettre à jour localStorage
      localStorage.setItem(`earnzone_user_${uid}`, JSON.stringify(userData));
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
      renderFormations();
    } else {
      window.location.href = 'login.html';
    }
  });
</script>
</body>
</html>
