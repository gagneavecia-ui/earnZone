<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --bg-medium: #08080F;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%); bottom: 20%; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(20px, -20px) scale(1.05); } 66% { transform: translate(-15px, 15px) scale(0.95); } }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-transform: uppercase;
      text-decoration: none;
    }
    .logo-text span {
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 40px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 32px 24px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-header p {
      color: var(--text-dim);
      font-size: 13px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-light);
    }
    .form-group label i {
      color: var(--primary);
      margin-right: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.2);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-login:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error {
      background: rgba(255, 77, 109, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      display: block;
    }
    .message.success {
      background: rgba(46, 232, 154, 0.15);
      border: 1px solid var(--success);
      color: var(--success);
      display: block;
    }

    .register-redirect {
      text-align: center;
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .register-redirect a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .register-redirect a:active {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid rgba(183, 110, 255, 0.06);
      margin-top: auto;
    }
    .footer p {
      color: var(--text-dim);
      font-size: 11px;
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="header">
  <a href="index.html" class="logo-text">EARN<span>ZONE</span></a>
</header>

<main class="container">
  <div class="login-card">
    <div class="login-header">
      <h1>Connexion</h1>
      <p>Accédez à votre compte EarnZone</p>
    </div>

    <div id="message" class="message error" style="display: none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="exemple@email.com" required>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Mot de passe</label>
        <input type="password" id="password" placeholder="Votre mot de passe" required>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>
    </form>

    <div class="register-redirect">
      Pas encore de compte ? <a href="register.html">Inscrivez-vous</a>
    </div>
  </div>
</main>

<footer class="footer">
  <p>&copy; 2026 EarnZone. Tous droits réservés.</p>
</footer>

<!-- Firebase - CHARGÉ EN DERNIER -->
<script type="module">
  // ============================================
  // CONFIGURATION FIREBASE
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
    authDomain: "earnzone-9e82e.firebaseapp.com",
    projectId: "earnzone-9e82e",
    storageBucket: "earnzone-9e82e.firebasestorage.app",
    messagingSenderId: "1076831479440",
    appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  // Persistance locale
  setPersistence(auth, browserLocalPersistence).catch(console.error);

  function showMessage(text, type) {
    const msgDiv = document.getElementById('message');
    msgDiv.className = `message ${type}`;
    msgDiv.innerText = text;
    msgDiv.style.display = 'block';
    setTimeout(() => {
      msgDiv.style.display = 'none';
    }, 3000);
  }

  // Redirection si déjà connecté (sans boucle infinie)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Déjà connecté, rediriger vers index
      window.location.href = 'index.html';
    }
  });

  // Formulaire de connexion
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showMessage('Veuillez remplir tous les champs.', 'error');
      return;
    }

    // Désactiver bouton
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loader"></span> Connexion en cours...';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      showMessage('Connexion réussie ! Redirection...', 'success');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
      
    } catch (error) {
      console.error("Erreur Firebase:", error);
      
      switch (error.code) {
        case 'auth/invalid-credential':
        case 'auth/user-not-found':
        case 'auth/wrong-password':
          showMessage('Email ou mot de passe incorrect.', 'error');
          break;
        case 'auth/invalid-email':
          showMessage('Email invalide.', 'error');
          break;
        case 'auth/too-many-requests':
          showMessage('Trop de tentatives. Réessayez plus tard.', 'error');
          break;
        default:
          showMessage('Erreur lors de la connexion. Réessayez.', 'error');
      }
      
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }
  });
</script>
</body>
</html>
