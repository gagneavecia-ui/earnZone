<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --transition: all 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }
    .container { max-width: 450px; width: 100%; margin: 0 auto; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 28px; font-weight: 700; font-family: 'Playfair Display', serif; }
    .logo span { background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    .card h2 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
    .card p { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error { background: rgba(255, 77, 109, 0.15); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .message.success { background: rgba(46, 232, 154, 0.15); border: 1px solid var(--success); color: var(--success); display: block; }
    .register-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-dim); }
    .register-link a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="container">
    <div class="logo">
      <h1>EARN<span>ZONE</span></h1>
      <p>Plateforme d'investissement</p>
    </div>
    <div class="card">
      <h2>Connexion</h2>
      <p>Connectez-vous à votre compte</p>
      <div id="message" class="message"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" class="form-control" placeholder="exemple@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" class="form-control" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
      </form>
      <div class="register-link">
        Pas encore de compte ? <a href="register.html">Inscrivez-vous</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword, signOut } from "firebase/auth";
    import { getFirestore, doc, getDoc, updateDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
      authDomain: "earnzone-9e82e.firebaseapp.com",
      projectId: "earnzone-9e82e",
      storageBucket: "earnzone-9e82e.firebasestorage.app",
      messagingSenderId: "1076831479440",
      appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
      messageDiv.className = 'message ' + type;
      messageDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + text;
      setTimeout(() => messageDiv.className = 'message', 5000);
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> Connexion...' : '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showMessage('Email et mot de passe requis', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        // Tentative de connexion Firebase
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Récupérer les données utilisateur
        const userDoc = await getDoc(doc(db, "users", user.uid));
        
        if (!userDoc.exists()) {
          await signOut(auth);
          showMessage('Erreur serveur. Veuillez réessayer plus tard.', 'error');
          setLoading(false);
          return;
        }
        
        const userData = userDoc.data();
        
        // ============================================
        // VÉRIFICATION BLOCAGE (MESSAGE VAGUE)
        // ============================================
        
        // 1. Vérifier si le compte est déjà bloqué
        if (userData.status === 'blocked') {
          await signOut(auth);
          showMessage('Erreur serveur. Veuillez réessayer plus tard.', 'error');
          setLoading(false);
          return;
        }
        
        // 2. Vérifier si la date d'expiration est dépassée
        if (userData.subscriptionEnd) {
          const today = new Date().toISOString().split('T')[0];
          if (userData.subscriptionEnd < today) {
            // Bloquer automatiquement le compte SANS prévenir l'utilisateur
            await updateDoc(doc(db, "users", user.uid), { 
              status: 'blocked', 
              blockedReason: 'auto_expired',
              blockedAt: new Date().toISOString()
            });
            await signOut(auth);
            showMessage('Erreur serveur. Veuillez réessayer plus tard.', 'error');
            setLoading(false);
            return;
          }
        }
        
        // Connexion réussie
        localStorage.setItem('earnzone_current_user', user.uid);
        showMessage('Connexion réussie ! Redirection...', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
        
      } catch (error) {
        console.error(error);
        // TOUTES les erreurs → message vague identique
        let errorMsg = "Erreur serveur. Veuillez réessayer plus tard.";
        
        // Même pour les erreurs classiques, on garde le même message
        if (error.code === 'auth/user-not-found') errorMsg = "Erreur serveur. Veuillez réessayer plus tard.";
        else if (error.code === 'auth/wrong-password') errorMsg = "Erreur serveur. Veuillez réessayer plus tard.";
        else if (error.code === 'auth/too-many-requests') errorMsg = "Erreur serveur. Veuillez réessayer plus tard.";
        else if (error.code === 'auth/invalid-email') errorMsg = "Erreur serveur. Veuillez réessayer plus tard.";
        else if (error.code === 'auth/network-request-failed') errorMsg = "Erreur serveur. Veuillez réessayer plus tard.";
        
        showMessage(errorMsg, 'error');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
