<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Inscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --warning: #FFD166;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%); bottom: 20%; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-transform: uppercase;
      text-decoration: none;
    }
    .logo-text span {
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      padding: 8px 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid rgba(183, 110, 255, 0.07);
    }
    .login-link:active {
      background: rgba(183, 110, 255, 0.1);
      transform: scale(0.98);
    }

    .container { max-width: 500px; margin: 0 auto; padding: 24px 16px 60px; }

    .form-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 28px 22px;
      animation: slideInUp 0.6s ease;
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-header { text-align: center; margin-bottom: 30px; }
    .form-header h1 { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .form-header p { color: var(--text-dim); font-size: 13px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .form-group label i { color: var(--primary); margin-right: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.2);
    }

    .row-2cols { display: flex; gap: 15px; }
    .row-2cols .form-group { flex: 1; }

    .phone-wrapper { display: flex; gap: 12px; align-items: center; }
    .phone-prefix { width: 90px; flex-shrink: 0; }
    .phone-number { flex: 1; }

    /* Sélecteur pays personnalisé */
    .country-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
    }
    .country-selector:active {
      transform: scale(0.98);
      border-color: var(--primary);
    }
    .country-selector-display {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .country-selector-display span:first-child { font-size: 22px; }
    .country-selector-display span:last-child { font-size: 14px; font-weight: 500; color: var(--text-light); }
    .country-selector i { color: var(--primary-light); font-size: 12px; }

    /* Modale pays */
    .country-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(3, 3, 5, 0.96);
      backdrop-filter: blur(16px);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .country-modal-overlay.show { opacity: 1; visibility: visible; }
    .country-modal {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(183, 110, 255, 0.2);
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow: hidden;
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    .country-modal-overlay.show .country-modal { transform: scale(1); }
    .country-modal-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(183, 110, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .country-modal-header h3 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .country-modal-close {
      width: 36px; height: 36px;
      background: rgba(183, 110, 255, 0.1);
      border: 1px solid rgba(183, 110, 255, 0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-dim);
    }
    .country-modal-close:active { background: rgba(183, 110, 255, 0.2); transform: scale(0.95); }
    .country-modal-search { padding: 12px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .country-modal-search input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      color: var(--text-light);
      font-size: 13px;
    }
    .country-modal-search input:focus { outline: none; border-color: var(--primary); }
    .country-modal-list { padding: 12px 8px; max-height: 400px; overflow-y: auto; }
    .country-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 4px;
    }
    .country-option:active { background: rgba(183, 110, 255, 0.1); transform: scale(0.98); }
    .country-option.selected { background: rgba(183, 110, 255, 0.15); border: 1px solid rgba(183, 110, 255, 0.25); }
    .country-option-flag { font-size: 24px; }
    .country-option-name { font-size: 14px; font-weight: 500; color: var(--text-light); }
    .country-option-code { margin-left: auto; font-size: 12px; color: var(--primary-light); font-family: monospace; }

    .indicatif-select {
      width: 100%;
      padding: 14px 12px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23B76EFF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 14px;
    }

    .referral-code-group {
      background: rgba(183, 110, 255, 0.05);
      border: 1px solid rgba(183, 110, 255, 0.15);
      border-radius: 16px;
      padding: 8px 1px;
      margin-bottom: 20px;
    }
    .referral-label {
      font-size: 12px;
      color: var(--primary-light);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .referral-input {
      width: 100%;
      padding: 12px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      text-transform: uppercase;
    }
    .referral-input:focus { outline: none; border-color: var(--primary); }
    .referral-info {
      margin-top: 8px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .referral-info.valid { color: var(--success); }
    .referral-info.invalid { color: var(--warning); }
    .referral-info i { font-size: 11px; }

    .btn-register {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-register:active { transform: scale(0.98); }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .message-banner {
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .message-banner.error { background: rgba(255, 77, 109, 0.15); border: 1px solid rgba(255, 77, 109, 0.3); color: var(--danger); }
    .message-banner.success { background: rgba(46, 232, 154, 0.15); border: 1px solid rgba(46, 232, 154, 0.3); color: var(--success); }
    .message-banner.warning { background: rgba(255, 209, 102, 0.15); border: 1px solid rgba(255, 209, 102, 0.3); color: var(--warning); }
    .hidden { display: none; }

    .login-redirect { text-align: center; margin-top: 24px; color: var(--text-dim); font-size: 13px; }
    .login-redirect a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .footer { text-align: center; padding: 20px; border-top: 1px solid rgba(183, 110, 255, 0.06); margin-top: 20px; }
    .footer p { color: var(--text-dim); font-size: 11px; }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="header">
  <a href="index.html" class="logo-text">EARN<span>ZONE</span></a>
  <a href="login.html" class="login-link"><i class="fas fa-sign-in-alt"></i> Connexion</a>
</header>

<main class="container">
  <div class="form-card">
    <div class="form-header">
      <h1>Créer un compte</h1>
      <p>Rejoignez EarnZone et commencez à investir</p>
    </div>

    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <form id="registerForm">
      <div class="row-2cols">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Nom</label>
          <input type="text" id="nom" placeholder="Votre nom" autocomplete="off">
        </div>
        <div class="form-group">
          <label><i class="fas fa-user"></i> Prénom</label>
          <input type="text" id="prenom" placeholder="Votre prénom" autocomplete="off">
        </div>
      </div>

      <!-- Sélecteur pays -->
      <div class="form-group">
        <label><i class="fas fa-globe-africa"></i> Pays</label>
        <div class="country-selector" id="countrySelector">
          <div class="country-selector-display">
            <span id="selectedCountryFlag">🇳🇪</span>
            <span id="selectedCountryName">Niger</span>
          </div>
          <i class="fas fa-chevron-down"></i>
        </div>
        <input type="hidden" id="pays" value="Niger">
      </div>

      <div class="form-group">
        <label><i class="fas fa-phone-alt"></i> Téléphone</label>
        <div class="phone-wrapper">
          <div class="phone-prefix">
            <select id="indicatif" class="indicatif-select">
              <option value="+227">+227 (Niger)</option>
              <option value="+229">+229 </option>
              <option value="+223">+223</option>
              <option value="+226">+226</option>
              <option value="+221">+221</option>
              <option value="+225">+225</option>
              <option value="+228">+228</option>
              <option value="+224">+224</option>
              <option value="+233">+233</option>
              <option value="+237">+237</option>
              <option value="+234">+234</option>
              <option value="+235">+235</option>
            </select>
          </div>
          <div class="phone-number">
            <input type="tel" id="telephone" placeholder="Numéro (ex: 90123456)" autocomplete="off">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="exemple@email.com" autocomplete="off">
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Mot de passe</label>
        <input type="password" id="password" placeholder="Minimum 6 caractères">
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe">
      </div>

      <!-- Code parrainage avec vérification en temps réel -->
      <div class="referral-code-group">
        <div class="referral-label">
          <i class="fas fa-gift"></i> Code de parrainage (optionnel)
        </div>
        <input type="text" id="referralCode" class="referral-input" placeholder="Code de votre parrain" autocomplete="off">
        <div id="referralInfo" class="referral-info" style="display: none;">
          <i class="fas fa-spinner fa-spin"></i>
          <span id="referralMessage">Vérification...</span>
        </div>
      </div>

      <button type="submit" class="btn-register" id="registerBtn">
        <i class="fas fa-user-plus"></i> S'inscrire
      </button>
    </form>

    <div class="login-redirect">
      Déjà un compte ? <a href="login.html">Connectez-vous</a>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 EarnZone. Tous droits réservés.</p>
  </footer>
</main>

<!-- MODALE PAYS -->
<div class="country-modal-overlay" id="countryModal">
  <div class="country-modal">
    <div class="country-modal-header">
      <h3><i class="fas fa-globe-africa"></i> Sélectionnez votre pays</h3>
      <div class="country-modal-close" id="closeCountryModalBtn">
        <i class="fas fa-times"></i>
      </div>
    </div>
    <div class="country-modal-search">
      <input type="text" id="countrySearch" placeholder="🔍 Rechercher un pays..." autocomplete="off">
    </div>
    <div class="country-modal-list" id="countryList"></div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // ========== CONFIGURATION ==========
  const firebaseConfig = {
    apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
    authDomain: "earnzone-9e82e.firebaseapp.com",
    projectId: "earnzone-9e82e",
    storageBucket: "earnzone-9e82e.firebasestorage.app",
    messagingSenderId: "1076831479440",
    appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence);

  // ========== LISTE DES PAYS ==========
  const countries = [
    { name: "Niger", flag: "🇳🇪", code: "+227", phoneDigits: [8] },
    { name: "Bénin", flag: "🇧🇯", code: "+229", phoneDigits: [8] },
    { name: "Mali", flag: "🇲🇱", code: "+223", phoneDigits: [8] },
    { name: "Burkina Faso", flag: "🇧🇫", code: "+226", phoneDigits: [8] },
    { name: "Sénégal", flag: "🇸🇳", code: "+221", phoneDigits: [9] },
    { name: "Côte d'Ivoire", flag: "🇨🇮", code: "+225", phoneDigits: [8, 10] },
    { name: "Togo", flag: "🇹🇬", code: "+228", phoneDigits: [8] },
    { name: "Guinée", flag: "🇬🇳", code: "+224", phoneDigits: [8, 9] },
    { name: "Ghana", flag: "🇬🇭", code: "+233", phoneDigits: [9, 10] },
    { name: "Cameroun", flag: "🇨🇲", code: "+237", phoneDigits: [9] },
    { name: "Nigéria", flag: "🇳🇬", code: "+234", phoneDigits: [10] },
    { name: "Tchad", flag: "🇹🇩", code: "+235", phoneDigits: [8] }
  ];

    let selectedCountry = "Niger";
  let selectedFlag = "🇳🇪";
  let selectedPhoneDigits = [8];
  let referralCheckStatus = { valid: false, parrainId: null, checked: false };

  // ========== AFFICHAGE MESSAGE ==========
  function showMessage(text, type = 'error') {
    const banner = document.getElementById('messageBanner');
    const icon = document.getElementById('messageIcon');
    const msgSpan = document.getElementById('messageText');
    
    if (type === 'error') {
      icon.className = 'fas fa-exclamation-circle';
      banner.className = 'message-banner error';
    } else if (type === 'success') {
      icon.className = 'fas fa-check-circle';
      banner.className = 'message-banner success';
    } else {
      icon.className = 'fas fa-info-circle';
      banner.className = 'message-banner warning';
    }
    
    msgSpan.innerText = text;
    banner.classList.remove('hidden');
    
    setTimeout(() => {
      banner.classList.add('hidden');
    }, 4000);
  }

  // ========== VALIDATION TÉLÉPHONE PAR PAYS ==========
  function validatePhone(phone, digitsArray) {
    const cleanPhone = phone.replace(/\D/g, '');
    return digitsArray.some(digits => cleanPhone.length === digits);
  }

  // ========== VÉRIFICATION CODE PARRAINAGE EN TEMPS RÉEL ==========
  async function checkReferralCode(code) {
    const referralInfoDiv = document.getElementById('referralInfo');
    const messageSpan = document.getElementById('referralMessage');
    
    if (!code || code.length < 4) {
      referralInfoDiv.style.display = 'none';
      referralCheckStatus = { valid: false, parrainId: null, checked: false };
      return null;
    }
    
    referralInfoDiv.style.display = 'flex';
    messageSpan.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';
    referralInfoDiv.className = 'referral-info';
    
    try {
      const normalizedCode = code.trim().toUpperCase();
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("referralCode", "==", normalizedCode));
      const querySnapshot = await getDocs(q);
      
      if (!querySnapshot.empty) {
        const parrainId = querySnapshot.docs[0].id;
        messageSpan.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Code valide ! Vous recevrez 500 FCFA après votre inscription.';
        referralInfoDiv.className = 'referral-info valid';
        referralCheckStatus = { valid: true, parrainId: parrainId, checked: true };
        return parrainId;
      } else {
        messageSpan.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Code invalide. Vous pouvez vous inscrire sans parrain.';
        referralInfoDiv.className = 'referral-info invalid';
        referralCheckStatus = { valid: false, parrainId: null, checked: true };
        return null;
      }
    } catch (error) {
      console.error("Erreur vérification:", error);
      messageSpan.innerHTML = '<i class="fas fa-exclamation-circle"></i> Erreur de vérification';
      referralInfoDiv.className = 'referral-info invalid';
      referralCheckStatus = { valid: false, parrainId: null, checked: true };
      return null;
    }
  }

  // ========== GÉNÉRATION CODE PARRAINAGE UNIQUE ==========
  async function generateUniqueReferralCode(uid, prenom, nom) {
    const base = (prenom.substring(0, 3) + nom.substring(0, 3) + uid.substring(0, 4)).toUpperCase().replace(/[^A-Z0-9]/g, '');
    let code = base.length >= 4 ? base.substring(0, 8) : base + uid.substring(0, 4);
    if (code.length < 4) code = code + Math.random().toString(36).substring(2, 6).toUpperCase();
    
    // Vérifier unicité
    let isUnique = false;
    let attempts = 0;
    let finalCode = code;
    
    while (!isUnique && attempts < 5) {
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("referralCode", "==", finalCode));
      const snapshot = await getDocs(q);
      
      if (snapshot.empty) {
        isUnique = true;
      } else {
        finalCode = code + Math.random().toString(36).substring(2, 5).toUpperCase();
        attempts++;
      }
    }
    return finalCode;
  }

  // ========== CRÉDITER LE PARRAIN ==========
  async function creditReferralReward(parrainUid) {
    if (!parrainUid) return false;
    try {
      const parrainRef = doc(db, "users", parrainUid);
      const parrainDoc = await getDoc(parrainRef);
      if (!parrainDoc.exists()) return false;
      
      const anciennesDonnees = parrainDoc.data();
      await updateDoc(parrainRef, {
        balance: (anciennesDonnees.balance || 0) + 500,
        referralBalance: (anciennesDonnees.referralBalance || 0) + 500,
        referralsCount: (anciennesDonnees.referralsCount || 0) + 1,
        referralEarnings: (anciennesDonnees.referralEarnings || 0) + 500,
        lastReferral: new Date().toISOString()
      });
      return true;
    } catch (error) {
      console.error("❌ Erreur crédit parrain:", error);
      return false;
    }
  }

  // ========== MODALE PAYS ==========
  function renderCountryList(filter = "") {
    const container = document.getElementById('countryList');
    const filtered = countries.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
    
    container.innerHTML = filtered.map(c => `
      <div class="country-option ${c.name === selectedCountry ? 'selected' : ''}" 
           data-name="${c.name}" data-flag="${c.flag}" data-code="${c.code}" data-digits="${c.phoneDigits.join(',')}">
        <span class="country-option-flag">${c.flag}</span>
        <span class="country-option-name">${c.name}</span>
        <span class="country-option-code">${c.code}</span>
      </div>
    `).join('');
    
    document.querySelectorAll('.country-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const name = opt.dataset.name;
        const flag = opt.dataset.flag;
        const code = opt.dataset.code;
        const digits = opt.dataset.digits.split(',').map(Number);
        selectCountry(name, flag, code, digits);
      });
    });
  }

  function selectCountry(name, flag, code, digits) {
    selectedCountry = name;
    selectedFlag = flag;
    selectedPhoneDigits = digits;
    
    document.getElementById('selectedCountryFlag').innerHTML = flag;
    document.getElementById('selectedCountryName').innerHTML = name;
    document.getElementById('pays').value = name;
    
    const indicatifSelect = document.getElementById('indicatif');
    for (let i = 0; i < indicatifSelect.options.length; i++) {
      if (indicatifSelect.options[i].value === code) {
        indicatifSelect.selectedIndex = i;
        break;
      }
    }
    closeCountryModal();
  }

  function openCountryModal() {
    document.getElementById('countryModal').classList.add('show');
    document.getElementById('countrySearch').value = '';
    renderCountryList();
  }
  
  function closeCountryModal() {
    document.getElementById('countryModal').classList.remove('show');
  }

  // ========== INITIALISATION UI ==========
  const countrySelector = document.getElementById('countrySelector');
  const closeModalBtn = document.getElementById('closeCountryModalBtn');
  const countrySearch = document.getElementById('countrySearch');
  const modalOverlay = document.getElementById('countryModal');
  
  countrySelector.addEventListener('click', openCountryModal);
  closeModalBtn.addEventListener('click', closeCountryModal);
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeCountryModal(); });
  if (countrySearch) {
    countrySearch.addEventListener('input', (e) => renderCountryList(e.target.value));
  }
  
  // Synchronisation indicatif/pays
  const indicatifSelect = document.getElementById('indicatif');
  indicatifSelect.addEventListener('change', (e) => {
    const selectedCode = e.target.value;
    const country = countries.find(c => c.code === selectedCode);
    if (country) {
      selectCountry(country.name, country.flag, country.code, country.phoneDigits);
    }
  });

  // Vérification code parrainage en temps réel
  const referralCodeInput = document.getElementById('referralCode');
  let debounceTimer;
  referralCodeInput.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      checkReferralCode(e.target.value);
    }, 500);
  });

  // Récupération code depuis URL
  const urlParams = new URLSearchParams(window.location.search);
  const refCode = urlParams.get('ref');
  if (refCode) {
    referralCodeInput.value = refCode;
    setTimeout(() => checkReferralCode(refCode), 300);
  }

  // ========== FORMULAIRE INSCRIPTION ==========
  const registerForm = document.getElementById('registerForm');
  const registerBtn = document.getElementById('registerBtn');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nom = document.getElementById('nom').value.trim();
    const prenom = document.getElementById('prenom').value.trim();
    const pays = document.getElementById('pays').value;
    const indicatif = document.getElementById('indicatif').value;
    const telephone = document.getElementById('telephone').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const referralCode = document.getElementById('referralCode').value.trim().toUpperCase();
    
    // Validations
    if (!nom || !prenom || !pays || !telephone || !email || !password) {
      showMessage('Tous les champs sont obligatoires.', 'error');
      return;
    }
    if (nom.length < 2 || prenom.length < 2) {
      showMessage('Le nom et prénom doivent contenir au moins 2 caractères.', 'error');
      return;
    }
    if (!validatePhone(telephone, selectedPhoneDigits)) {
      const digitsText = selectedPhoneDigits.join(' ou ');
      showMessage(`Numéro invalide pour ${selectedCountry}. Il doit contenir ${digitsText} chiffres.`, 'error');
      return;
    }
    if (!email.includes('@') || !email.includes('.')) {
      showMessage('Email invalide.', 'error');
      return;
    }
    if (password.length < 6) {
      showMessage('Le mot de passe doit contenir au moins 6 caractères.', 'error');
      return;
    }
    if (password !== confirmPassword) {
      showMessage('Les mots de passe ne correspondent pas.', 'error');
      return;
    }
    
    // Vérification code parrainage (non bloquante)
    let parrainId = null;
    if (referralCode && referralCode.length >= 4) {
      parrainId = await checkReferralCode(referralCode);
      if (!parrainId) {
        showMessage(`⚠️ Le code "${referralCode}" est invalide. Vous pouvez continuer sans parrain.`, 'warning');
      }
    }
    
    // Désactiver bouton
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="loader"></span> Inscription en cours...';
    
    try {
      // Création compte Firebase Auth
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      // Génération code parrainage unique
      const generatedReferralCode = await generateUniqueReferralCode(user.uid, prenom, nom);
      const fullPhone = `${indicatif} ${telephone}`;
      const now = new Date().toISOString();
      
      const userData = {
        uid: user.uid,
        email: email,
        nom: nom,
        prenom: prenom,
        pays: pays,
        phone: fullPhone,
        balance: 0,
        realBalance: 0,
        referralBalance: 0,
        gainsTotal: 0,
        totalInvested: 0,
        totalWithdrawn: 0,
        status: "active",
        role: "user",
        hasDeposited: false,
        hasInvested: false,
        activeInvestmentsCount: 0,
        registrationDate: now,
        lastGainDate: now,
        lastInvestment: null,
        lastWithdrawal: null,
        subscriptionEnd: null,
        investments: [],
        gainsHistory: [],
        createdAt: now,
        referralCode: generatedReferralCode,
        referredBy: referralCode || null,
        referralsCount: 0,
        referralEarnings: 0,
        referralHistory: []
      };
      
      await setDoc(doc(db, "users", user.uid), userData);
      localStorage.setItem(`earnzone_user_${user.uid}`, JSON.stringify(userData));
      localStorage.setItem('earnzone_current_user', user.uid);
      
      // Créditer le parrain si code valide
      if (parrainId) {
        await creditReferralReward(parrainId);
      }
      
      showMessage('✅ Inscription réussie ! Redirection...', 'success');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
      
    } catch (error) {
      console.error("❌ Erreur inscription:", error);
      
      let errorMsg = 'Erreur lors de l\'inscription.';
      switch (error.code) {
        case 'auth/email-already-in-use':
          errorMsg = 'Cet email est déjà utilisé. Connectez-vous.';
          break;
        case 'auth/invalid-email':
          errorMsg = 'Email invalide.';
          break;
        case 'auth/weak-password':
          errorMsg = 'Mot de passe trop faible (minimum 6 caractères).';
          break;
        default:
          errorMsg = error.message || 'Erreur lors de l\'inscription. Réessayez.';
      }
      
      showMessage(errorMsg, 'error');
      registerBtn.disabled = false;
      registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
    }
  });
</script>
