<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Inscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== VARIABLES - STYLE UNIFORME ===== */
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --primary-glow: rgba(183, 110, 255, 0.35);
      --bg-dark: #030305;
      --bg-medium: #08080F;
      --bg-light: #0F0F1A;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --card-border-hover: rgba(183, 110, 255, 0.25);
      --success: #2EE89A;
      --warning: #FFD166;
      --danger: #FF4D6D;
      --shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.9);
      --shadow-glow: 0 0 40px rgba(183, 110, 255, 0.2);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
      --glass-border: rgba(183, 110, 255, 0.07);
      --grain-opacity: 0.035;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      -webkit-font-smoothing: antialiased;
      position: relative;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ===== LOADER FIREBASE ===== */
    .firebase-loader {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      color: var(--primary-light);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(183,110,255,0.2);
      transition: opacity 0.3s;
    }
    .firebase-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(183,110,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== GRAIN TEXTURE ===== */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* ===== BACKGROUND ===== */
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(8, 8, 20, 0.6) 0%, transparent 80%),
        linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%);
      top: -100px; left: -100px;
    }

    .orb-2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%);
      bottom: 20%; right: -80px;
      animation-delay: -4s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: nexusGlow 3s ease-in-out infinite;
    }

    @keyframes nexusGlow {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 0px rgba(183, 110, 255, 0)); }
      50% { filter: brightness(1.3) drop-shadow(0 0 10px rgba(183, 110, 255, 0.6)); }
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      font-style: italic;
    }

    .logo-text span {
      color: var(--primary);
    }

    .login-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      padding: 8px 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
    }

    .login-link:active {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ===== FORMULAIRE ===== */
    .form-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 28px 22px;
      animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-header h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-header p {
      color: var(--text-dim);
      font-size: 13.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-light);
    }

    .form-group label i {
      color: var(--primary);
      margin-right: 6px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.2);
    }

    /* Champ téléphone avec indicatif */
    .phone-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .phone-prefix {
      width: 80px;
      flex-shrink: 0;
    }

    .phone-prefix select {
      padding: 14px 8px;
      text-align: center;
    }

    .phone-number {
      flex: 1;
    }

    .phone-number input {
      width: 100%;
    }

    /* Ligne double (nom/prénom) */
    .row-2cols {
      display: flex;
      gap: 15px;
    }

    .row-2cols .form-group {
      flex: 1;
    }

    /* Bouton inscription */
    .btn-register {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-register:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Message d'erreur */
    .error-message {
      background: rgba(255, 77, 109, 0.15);
      border: 1px solid rgba(255, 77, 109, 0.3);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--danger);
      font-size: 13px;
    }

    .error-message i {
      font-size: 16px;
    }

    .success-message {
      background: rgba(46, 232, 154, 0.15);
      border: 1px solid rgba(46, 232, 154, 0.3);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--success);
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    .login-redirect {
      text-align: center;
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .login-redirect a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-redirect a:active {
      text-decoration: underline;
    }

    /* ===== FOOTER ===== */
    .footer {
      border-top: 1px solid rgba(183, 110, 255, 0.06);
      padding: 30px 0 20px;
      text-align: center;
    }

    .footer-text {
      color: var(--text-dim);
      font-size: 12px;
    }

    /* Spinner de chargement */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Loader Firebase (chargement asynchrone) -->
  <div class="firebase-loader" id="firebaseLoader">
    <div class="loader-spinner"></div>
    <span>Chargement...</span>
  </div>

  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">E</div>
      <div class="logo-text">EARN<span>ZONE</span></div>
    </a>
    <a href="login.html" class="login-link">
      <i class="fas fa-sign-in-alt"></i> Connexion
    </a>
  </header>

  <main class="container">
    <div class="form-card">
      <div class="form-header">
        <h1>Créer un compte</h1>
        <p>Rejoignez EarnZone et commencez à investir</p>
      </div>

      <!-- Messages d'erreur / succès -->
      <div id="errorMessage" class="error-message hidden">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>
      <div id="successMessage" class="success-message hidden">
        <i class="fas fa-check-circle"></i>
        <span>Compte créé avec succès ! Redirection...</span>
      </div>

      <form id="registerForm">
        <!-- Nom et Prénom (2 colonnes) -->
        <div class="row-2cols">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Nom</label>
            <input type="text" id="nom" placeholder="Votre nom" required autocomplete="family-name">
          </div>
          <div class="form-group">
            <label><i class="fas fa-user"></i> Prénom</label>
            <input type="text" id="prenom" placeholder="Votre prénom" required autocomplete="given-name">
          </div>
        </div>

        <!-- Pays -->
        <div class="form-group">
          <label><i class="fas fa-globe-africa"></i> Pays</label>
          <select id="pays" required>
            <option value="">Sélectionnez votre pays</option>
            <option value="Bénin" data-prefix="+229">🇧🇯 Bénin (+229)</option>
            <option value="Niger" data-prefix="+227" selected>🇳🇪 Niger (+227)</option>
            <option value="Mali" data-prefix="+223">🇲🇱 Mali (+223)</option>
            <option value="Burkina Faso" data-prefix="+226">🇧🇫 Burkina Faso (+226)</option>
            <option value="Sénégal" data-prefix="+221">🇸🇳 Sénégal (+221)</option>
            <option value="Côte d'Ivoire" data-prefix="+225">🇨🇮 Côte d'Ivoire (+225)</option>
            <option value="Togo" data-prefix="+228">🇹🇬 Togo (+228)</option>
          </select>
        </div>

        <!-- Téléphone avec indicatif -->
        <div class="form-group">
          <label><i class="fas fa-phone-alt"></i> Téléphone</label>
          <div class="phone-wrapper">
            <div class="phone-prefix">
              <select id="indicatif" required>
                <option value="+227">+227</option>
                <option value="+229">+229</option>
                <option value="+223">+223</option>
                <option value="+226">+226</option>
                <option value="+221">+221</option>
                <option value="+225">+225</option>
                <option value="+228">+228</option>
              </select>
            </div>
            <div class="phone-number">
              <input type="tel" id="telephone" placeholder="Numéro (ex: 90123456)" required autocomplete="tel">
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="exemple@email.com" required autocomplete="email">
        </div>

        <!-- Mot de passe -->
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" placeholder="Minimum 6 caractères" required autocomplete="new-password">
        </div>

        <!-- Confirmation mot de passe -->
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required autocomplete="off">
        </div>

        <button type="submit" class="btn-register" id="registerBtn">
          <i class="fas fa-user-plus"></i> S'inscrire
        </button>
      </form>

      <div class="login-redirect">
        Déjà un compte ? <a href="login.html">Connectez-vous</a>
      </div>
    </div>

    <footer class="footer">
      <p class="footer-text">&copy; 2026 EarnZone. Tous droits réservés.</p>
    </footer>
  </main>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    // ===== CONFIGURATION =====
    const firebaseConfig = {
      apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
      authDomain: "earnzone-9e82e.firebaseapp.com",
      projectId: "earnzone-9e82e",
      storageBucket: "earnzone-9e82e.firebasestorage.app",
      messagingSenderId: "1076831479440",
      appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
    };

    // ===== VARIABLES GLOBALES =====
    let auth, db;
    let isFirebaseReady = false;

    // ===== FONCTIONS UI =====
    function showError(message) {
      const errorMessageDiv = document.getElementById('errorMessage');
      const errorTextSpan = document.getElementById('errorText');
      errorTextSpan.textContent = message;
      errorMessageDiv.classList.remove('hidden');
      document.getElementById('successMessage').classList.add('hidden');
      
      setTimeout(() => {
        errorMessageDiv.classList.add('hidden');
      }, 5000);
    }

    function showSuccess() {
      document.getElementById('successMessage').classList.remove('hidden');
      document.getElementById('errorMessage').classList.add('hidden');
    }

    function setLoading(isLoading) {
      const registerBtn = document.getElementById('registerBtn');
      if (isLoading) {
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<span class="spinner"></span> Inscription en cours...';
      } else {
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
      }
    }

    function validateEmail(email) {
      const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      return re.test(email);
    }

    function validatePhone(phone) {
      const re = /^[0-9]{6,10}$/;
      return re.test(phone);
    }

    // ===== INDICATIF TÉLÉPHONE DYNAMIQUE =====
    const paysSelect = document.getElementById('pays');
    const indicatifSelect = document.getElementById('indicatif');

    const indicatifMapping = {
      'Bénin': '+229',
      'Niger': '+227',
      'Mali': '+223',
      'Burkina Faso': '+226',
      'Sénégal': '+221',
      'Côte d\'Ivoire': '+225',
      'Togo': '+228'
    };

    function updateIndicatif() {
      const selectedPays = paysSelect.value;
      if (selectedPays && indicatifMapping[selectedPays]) {
        indicatifSelect.value = indicatifMapping[selectedPays];
      }
    }

    function updatePays() {
      const selectedIndicatif = indicatifSelect.value;
      for (const [pays, indicatif] of Object.entries(indicatifMapping)) {
        if (indicatif === selectedIndicatif) {
          paysSelect.value = pays;
          break;
        }
      }
    }

    paysSelect.addEventListener('change', updateIndicatif);
    indicatifSelect.addEventListener('change', updatePays);

    // ===== FONCTION D'INSCRIPTION =====
    async function handleRegister(event) {
      event.preventDefault();
      
      if (!isFirebaseReady) {
        showError('Chargement en cours, veuillez patienter...');
        return;
      }

      // Récupération des valeurs
      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const pays = document.getElementById('pays').value;
      const indicatif = document.getElementById('indicatif').value;
      const telephone = document.getElementById('telephone').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validations
      if (!nom || !prenom || !pays || !telephone || !email || !password || !confirmPassword) {
        showError('Tous les champs sont obligatoires.');
        return;
      }

      if (nom.length < 2 || prenom.length < 2) {
        showError('Le nom et le prénom doivent contenir au moins 2 caractères.');
        return;
      }

      if (!validatePhone(telephone)) {
        showError('Numéro de téléphone invalide. Utilisez 6 à 10 chiffres sans espaces.');
        return;
      }

      if (!validateEmail(email)) {
        showError('Adresse email invalide.');
        return;
      }

      if (password.length < 6) {
        showError('Le mot de passe doit comporter au moins 6 caractères.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Les mots de passe ne correspondent pas.');
        return;
      }

      setLoading(true);

      try {
        // Vérifier si l'email existe déjà dans Firestore
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("email", "==", email));
        const querySnapshot = await getDocs(q);
        
        if (!querySnapshot.empty) {
          showError('Un compte avec cet email existe déjà. Connectez-vous.');
          setLoading(false);
          return;
        }

        // Vérifier avec Firebase Auth
        const signInMethods = await fetchSignInMethodsForEmail(auth, email);
        if (signInMethods.length > 0) {
          showError('Un compte avec cet email existe déjà. Connectez-vous.');
          setLoading(false);
          return;
        }

        // Créer l'utilisateur
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const firebaseUser = userCredential.user;

        // Configurer la persistance pour la session
        await setPersistence(auth, browserLocalPersistence);

        // Données utilisateur
        const fullPhoneNumber = indicatif + telephone;
        const fullName = prenom + ' ' + nom;
        
        const userData = {
          uid: firebaseUser.uid,
          nom: nom,
          prenom: prenom,
          fullName: fullName,
          pays: pays,
          phone: fullPhoneNumber,
          email: email,
          balance: 0,
          investments: [],
          gainsTotal: 0,
          courses: [],
          registrationDate: new Date().toISOString(),
          daysActive: 0,
          createdAt: firebaseUser.metadata.creationTime,
          lastLogin: new Date().toISOString(),
          hasDeposited: false
        };

        // Enregistrer dans Firestore
        await setDoc(doc(db, "users", firebaseUser.uid), userData);

        // Sauvegarder dans le cache localStorage
        localStorage.setItem('earnzone_user_cache', JSON.stringify({
          userData: userData,
          timestamp: Date.now(),
          email: email,
          isAdmin: false
        }));

        showSuccess();

        // Redirection après inscription
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        console.error("Erreur d'inscription:", error);
        
        let errorMessage = "Une erreur est survenue lors de l'inscription.";
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMessage = 'Cet email est déjà utilisé. Connectez-vous.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Adresse email invalide.';
            break;
          case 'auth/weak-password':
            errorMessage = 'Le mot de passe est trop faible. Utilisez au moins 6 caractères.';
            break;
          case 'auth/network-request-failed':
            errorMessage = 'Problème de connexion. Vérifiez votre réseau.';
            break;
          default:
            errorMessage = error.message || errorMessage;
        }
        
        showError(errorMessage);
        setLoading(false);
      }
    }

    // ===== CHARGEMENT ASYNCHRONE DE FIREBASE =====
    async function loadFirebase() {
      const loader = document.getElementById('firebaseLoader');
      loader.classList.remove('hidden');
      
      try {
        const { initializeApp } = await import("firebase/app");
        const { 
          getAuth, 
          createUserWithEmailAndPassword,
          fetchSignInMethodsForEmail,
          setPersistence,
          browserLocalPersistence
        } = await import("firebase/auth");
        const { 
          getFirestore, 
          doc, 
          setDoc, 
          collection,
          query,
          where,
          getDocs
        } = await import("firebase/firestore");
        
        // Exposer les fonctions globalement
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.fetchSignInMethodsForEmail = fetchSignInMethodsForEmail;
        window.setPersistence = setPersistence;
        window.browserLocalPersistence = browserLocalPersistence;
        window.doc = doc;
        window.setDoc = setDoc;
        window.collection = collection;
        window.query = query;
        window.where = where;
        window.getDocs = getDocs;
        
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        // Configurer la persistance
        await setPersistence(auth, browserLocalPersistence);
        console.log('✅ Persistence locale configurée');
        
        window.auth = auth;
        window.db = db;
        
        isFirebaseReady = true;
        
        // Activer le formulaire
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', handleRegister);
        
      } catch (error) {
        console.error('Erreur chargement Firebase:', error);
        showError('Erreur de connexion. Rechargez la page.');
      } finally {
        setTimeout(() => {
          loader.classList.add('hidden');
        }, 500);
      }
    }

    // ===== INITIALISATION =====
    (function init() {
      // Pays Niger par défaut
      paysSelect.value = 'Niger';
      updateIndicatif();
      
      // Charger Firebase en arrière-plan
      loadFirebase();
    })();
  </script>
