<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Inscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
                  linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%); bottom: 20%; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-transform: uppercase;
      text-decoration: none;
    }
    .logo-text span {
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      padding: 8px 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid rgba(183, 110, 255, 0.07);
    }

    .container { max-width: 500px; margin: 0 auto; padding: 24px 16px 60px; }

    .form-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 28px 22px;
      animation: slideInUp 0.6s ease;
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-header { text-align: center; margin-bottom: 30px; }
    .form-header h1 { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .form-header p { color: var(--text-dim); font-size: 13px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .form-group label i { color: var(--primary); margin-right: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.2);
    }

    .row-2cols { display: flex; gap: 15px; }
    .row-2cols .form-group { flex: 1; }

    .phone-wrapper { display: flex; gap: 12px; align-items: center; }
    .phone-prefix { width: 80px; flex-shrink: 0; }
    .phone-number { flex: 1; }

    /* Champ parrainage */
    .referral-code-group {
      background: rgba(183, 110, 255, 0.05);
      border: 1px solid rgba(183, 110, 255, 0.15);
      border-radius: 16px;
      padding: 8px 12px;
      margin-bottom: 20px;
    }
    .referral-label {
      font-size: 11px;
      color: var(--primary-light);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .referral-info {
      font-size: 10px;
      color: var(--success);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .referral-info i { font-size: 10px; }

    .btn-register {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-register:active { transform: scale(0.98); }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-message {
      background: rgba(255, 77, 109, 0.15);
      border: 1px solid rgba(255, 77, 109, 0.3);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--danger);
      font-size: 13px;
    }
    .success-message {
      background: rgba(46, 232, 154, 0.15);
      border: 1px solid rgba(46, 232, 154, 0.3);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--success);
      font-size: 13px;
    }
    .hidden { display: none; }

    .login-redirect { text-align: center; margin-top: 24px; color: var(--text-dim); font-size: 13px; }
    .login-redirect a { color: var(--primary); text-decoration: none; font-weight: 600; }

    .footer { text-align: center; padding: 20px; border-top: 1px solid rgba(183, 110, 255, 0.06); margin-top: 20px; }
    .footer p { color: var(--text-dim); font-size: 11px; }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="header">
  <a href="index.html" class="logo-text">EARN<span>ZONE</span></a>
  <a href="login.html" class="login-link"><i class="fas fa-sign-in-alt"></i> Connexion</a>
</header>

<main class="container">
  <div class="form-card">
    <div class="form-header">
      <h1>Créer un compte</h1>
      <p>Rejoignez EarnZone et commencez à investir</p>
    </div>

    <div id="errorMessage" class="error-message hidden">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText"></span>
    </div>
    <div id="successMessage" class="success-message hidden">
      <i class="fas fa-check-circle"></i>
      <span>Compte créé avec succès ! Redirection...</span>
    </div>

    <form id="registerForm">
      <div class="row-2cols">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Nom</label>
          <input type="text" id="nom" placeholder="Votre nom" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-user"></i> Prénom</label>
          <input type="text" id="prenom" placeholder="Votre prénom" required>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-globe-africa"></i> Pays</label>
        <select id="pays" required>
          <option value="">Sélectionnez votre pays</option>
          <option value="Bénin">🇧🇯 Bénin</option>
          <option value="Niger" selected>🇳🇪 Niger</option>
          <option value="Mali">🇲🇱 Mali</option>
          <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
          <option value="Sénégal">🇸🇳 Sénégal</option>
          <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
        </select>
      </div>

      <div class="form-group">
        <label><i class="fas fa-phone-alt"></i> Téléphone</label>
        <div class="phone-wrapper">
          <div class="phone-prefix">
            <select id="indicatif" required>
              <option value="+227">+227</option>
              <option value="+229">+229</option>
              <option value="+223">+223</option>
              <option value="+226">+226</option>
              <option value="+221">+221</option>
              <option value="+225">+225</option>
            </select>
          </div>
          <div class="phone-number">
            <input type="tel" id="telephone" placeholder="Numéro (ex: 90123456)" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="exemple@email.com" required>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Mot de passe</label>
        <input type="password" id="password" placeholder="Minimum 6 caractères" required>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required>
      </div>

      <!-- 🌟 NOUVEAU : CHAMP CODE DE PARRAINAGE (OPTIONNEL) 🌟 -->
      <div class="referral-code-group">
        <div class="referral-label">
          <i class="fas fa-gift"></i> Code de parrainage (optionnel)
        </div>
        <input type="text" id="referralCode" placeholder="Code de votre parrain" style="background: rgba(20,20,35,0.8); border: none; color: white; width: 100%;">
        <div class="referral-info" id="referralInfo" style="display: none;">
          <i class="fas fa-check-circle"></i> <span id="referralMessage"></span>
        </div>
      </div>

      <button type="submit" class="btn-register" id="registerBtn">
        <i class="fas fa-user-plus"></i> S'inscrire
      </button>
    </form>

    <div class="login-redirect">
      Déjà un compte ? <a href="login.html">Connectez-vous</a>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 EarnZone. Tous droits réservés.</p>
  </footer>
</main>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
</script>

  <script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } from "firebase/auth";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
    authDomain: "earnzone-9e82e.firebaseapp.com",
    projectId: "earnzone-9e82e",
    storageBucket: "earnzone-9e82e.firebasestorage.app",
    messagingSenderId: "1076831479440",
    appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence);

  // ========== LECTURE DU CODE PARRAINAGE DANS L'URL ==========
  const urlParams = new URLSearchParams(window.location.search);
  const refCode = urlParams.get('ref');
  
  console.log("🔍 Code détecté dans l'URL:", refCode);

  // ========== RÉFÉRENCES DOM ==========
  const registerForm = document.getElementById('registerForm');
  const errorMessageDiv = document.getElementById('errorMessage');
  const errorTextSpan = document.getElementById('errorText');
  const successMessageDiv = document.getElementById('successMessage');
  const registerBtn = document.getElementById('registerBtn');
  
  // Créer dynamiquement le champ de parrainage s'il n'existe pas
  let referralCodeInput = document.getElementById('referralCode');
  let referralMessageDiv = document.getElementById('referralMessage');
  
  if (!referralCodeInput) {
    const formGroups = document.querySelectorAll('.form-group');
    const lastFormGroup = formGroups[formGroups.length - 1];
    const newDiv = document.createElement('div');
    newDiv.className = 'form-group';
    newDiv.innerHTML = `
      <label><i class="fas fa-gift"></i> Code de parrainage (optionnel)</label>
      <input type="text" id="referralCode" placeholder="Code de votre parrain">
      <div id="referralMessage" style="font-size: 12px; margin-top: 5px;"></div>
    `;
    lastFormGroup.insertAdjacentElement('afterend', newDiv);
    referralCodeInput = document.getElementById('referralCode');
    referralMessageDiv = document.getElementById('referralMessage');
  }
  
  if (refCode && referralCodeInput) {
    referralCodeInput.value = refCode;
    checkReferralCode(refCode);
  }

  // ========== VÉRIFIER LE CODE DE PARRAINAGE ==========
  async function checkReferralCode(code) {
    if (!code || code.length < 4) return;
    try {
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("referralCode", "==", code));
      const querySnapshot = await getDocs(q);
      
      if (!querySnapshot.empty) {
        if (referralMessageDiv) {
          referralMessageDiv.innerHTML = `✅ Code valide ! Votre parrain recevra 500 FCFA après votre inscription.`;
          referralMessageDiv.style.color = "#2EE89A";
        }
      } else {
        if (referralMessageDiv) {
          referralMessageDiv.innerHTML = `⚠️ Code invalide. Vous pouvez vous inscrire sans parrain.`;
          referralMessageDiv.style.color = "#FFD166";
        }
      }
    } catch (error) {
      console.error("Erreur vérification:", error);
    }
  }

  if (referralCodeInput) {
    referralCodeInput.addEventListener('input', (e) => {
      if (e.target.value.length >= 4) {
        checkReferralCode(e.target.value);
      } else if (referralMessageDiv) {
        referralMessageDiv.innerHTML = '';
      }
    });
  }

  // ========== GESTION INDICATIF TÉLÉPHONE ==========
  const indicatifMapping = {
    'Bénin': '+229', 'Niger': '+227', 'Mali': '+223',
    'Burkina Faso': '+226', 'Sénégal': '+221', 'Côte d\'Ivoire': '+225'
  };

  const paysSelect = document.getElementById('pays');
  const indicatifSelect = document.getElementById('indicatif');

  function updateIndicatif() {
    const selectedPays = paysSelect.value;
    if (selectedPays && indicatifMapping[selectedPays]) {
      indicatifSelect.value = indicatifMapping[selectedPays];
    }
  }

  if (paysSelect) paysSelect.addEventListener('change', updateIndicatif);
  document.addEventListener('DOMContentLoaded', () => {
    if (paysSelect) {
      paysSelect.value = 'Niger';
      updateIndicatif();
    }
  });

  // ========== GÉNÉRATION CODE PARRAINAGE ==========
  function generateReferralCode(nom, prenom, email) {
    const prefix = (prenom.substring(0, 3) + nom.substring(0, 3)).toUpperCase();
    const random = Math.random().toString(36).substring(2, 8).toUpperCase();
    let code = `${prefix}${random}`;
    code = code.replace(/[^A-Z0-9]/g, '');
    return code.substring(0, 12);
  }

  // ========== 🌟 CRÉDITER LA RÉCOMPENSE DU PARRAIN (500 FCFA) 🌟 ==========
  async function creditReferralReward(parrainUid) {
    try {
      const parrainRef = doc(db, "users", parrainUid);
      const parrainDoc = await getDoc(parrainRef);
      if (parrainDoc.exists()) {
        const newBalance = (parrainDoc.data().balance || 0) + 500;
        const newReferralsCount = (parrainDoc.data().referralsCount || 0) + 1;
        const newReferralEarnings = (parrainDoc.data().referralEarnings || 0) + 500;
        
        await updateDoc(parrainRef, {
          balance: newBalance,
          referralsCount: newReferralsCount,
          referralEarnings: newReferralEarnings
        });
        
        console.log(`✅ 500 FCFA crédités au parrain ${parrainUid}`);
        console.log(`💰 Nouveau solde du parrain: ${newBalance} FCFA`);
        return true;
      }
    } catch (error) {
      console.error("❌ Erreur crédit récompense:", error);
    }
    return false;
  }

  // ========== VALIDATION INSCRIPTION ==========
  function showError(message) {
    errorTextSpan.textContent = message;
    errorMessageDiv.classList.remove('hidden');
    successMessageDiv.classList.add('hidden');
    setTimeout(() => errorMessageDiv.classList.add('hidden'), 4000);
  }

  function showSuccess() {
    successMessageDiv.classList.remove('hidden');
    errorMessageDiv.classList.add('hidden');
  }

  function validateEmail(email) {
    return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
  }

  function validatePhone(phone) {
    return /^[0-9]{6,10}$/.test(phone);
  }

  // ========== SOUMISSION DU FORMULAIRE ==========
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nom = document.getElementById('nom').value.trim();
    const prenom = document.getElementById('prenom').value.trim();
    const pays = document.getElementById('pays')?.value;
    const indicatif = document.getElementById('indicatif')?.value || '+227';
    const telephone = document.getElementById('telephone').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const referralCode = document.getElementById('referralCode')?.value.trim();

    // Validations...
    if (!nom || !prenom || !pays || !telephone || !email || !password) {
      showError('Tous les champs sont obligatoires.');
      return;
    }
    if (nom.length < 2 || prenom.length < 2) {
      showError('Le nom et prénom doivent contenir au moins 2 caractères.');
      return;
    }
    if (!validatePhone(telephone)) {
      showError('Numéro de téléphone invalide (6 à 10 chiffres).');
      return;
    }
    if (!validateEmail(email)) {
      showError('Email invalide.');
      return;
    }
    if (password.length < 6) {
      showError('Le mot de passe doit contenir au moins 6 caractères.');
      return;
    }
    if (password !== confirmPassword) {
      showError('Les mots de passe ne correspondent pas.');
      return;
    }

    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="loader"></span> Inscription en cours...';

    try {
      // Vérifier le code de parrainage
      let parrainUid = null;
      if (referralCode && referralCode.length >= 4) {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("referralCode", "==", referralCode));
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) {
          parrainUid = querySnapshot.docs[0].id;
        } else if (referralCode) {
          showError('Code de parrainage invalide.');
          registerBtn.disabled = false;
          registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
          return;
        }
      }

      // Création du compte Firebase Auth
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      // Génération du code de parrainage pour le nouvel utilisateur
      const generatedReferralCode = generateReferralCode(nom, prenom, email);
      const now = new Date();
      
      // Création du document utilisateur
      const userData = {
        uid: user.uid,
        email: email,
        nom: nom,
        prenom: prenom,
        pays: pays,
        phone: `${indicatif} ${telephone}`,
        balance: 0,
        gainsTotal: 0,
        totalInvested: 0,
        totalWithdrawn: 0,
        status: "active",
        role: "user",
        hasDeposited: false,
        registrationDate: now.toISOString(),
        lastGainDate: now.toISOString(),
        lastInvestment: null,
        lastWithdrawal: null,
        subscriptionEnd: null,
        investments: [],
        gainsHistory: [],
        createdAt: now.toISOString(),
        referralCode: generatedReferralCode,
        referredBy: referralCode || null,
        referralsCount: 0,
        referralEarnings: 0,
        referralHistory: []
      };

      await setDoc(doc(db, "users", user.uid), userData);

      // 🌟 CRÉDITER LES 500 FCFA AU PARRAIN 🌟
      if (parrainUid) {
        await creditReferralReward(parrainUid);
      }

      // Stockage localStorage
      localStorage.setItem(`earnzone_user_${user.uid}`, JSON.stringify(userData));
      localStorage.setItem('earnzone_current_user', user.uid);
      
      console.log("✅ Inscription réussie");
      console.log("🔗 Votre code de parrainage:", generatedReferralCode);
      console.log("🔗 Lien:", `https://gagneavecia-ui.github.io/earnZone/register.html?ref=${generatedReferralCode}`);

      showSuccess();
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);

    } catch (error) {
      console.error("❌ ERREUR:", error);
      
      let errorMsg = 'Erreur lors de l\'inscription.';
      switch (error.code) {
        case 'auth/email-already-in-use':
          errorMsg = 'Cet email est déjà utilisé. Connectez-vous.';
          break;
        case 'auth/invalid-email':
          errorMsg = 'Email invalide.';
          break;
        case 'auth/weak-password':
          errorMsg = 'Mot de passe trop faible (minimum 6 caractères).';
          break;
        default:
          errorMsg = error.message || 'Erreur lors de l\'inscription. Réessayez.';
      }
      
      showError(errorMsg);
      registerBtn.disabled = false;
      registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
    }
  });
</script>
</body>
</html>
